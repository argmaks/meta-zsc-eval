# Experiment metadata
experiment:
  name: "explain_zsc_methods"
  description: "Testing the hypothesis that LLMs have a good understanding of ZSC methods."

workspace_dir: null

# Runner configuration - specify which LLM agent to use
runner:
  _target_: runners.query_llm.QueryLLMRunner
  model: "gemini/gemini-2.5-flash"
  temperature: null
  max_tokens: null

# Prompt configuration
prompt:
  template_name: "EXPLAIN_ZSC_TEMPLATE"
  contents:
    system_prompt: "You are a senior researcher specializing in multi-agent reinforcement learning and zero-shot coordination."
    zsc_method: "Other-play"
    extra_instructions: "Give a short summary of the method, explain how it approaches the problem of zero-shot coordination and give a tutorial on how to implement it in practice."

# Context files/directories to include in the experiment
env: null
algo: null
extra_workspace_files: []