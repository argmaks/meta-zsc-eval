defaults:
  - runner: decpomdp_symmetries_op_ippo_ff_hanabi

# Experiment metadata
experiment:
  name: "easy_hanabi"
  description: "Running `decpomdp_symmetries_op_ippo_ff_hanabi.py` from https://github.com/gfppoy/expected-return-symmetries/."

workspace_dir: null

# Runner configuration - specify which LLM agent to use
runner:
  _target_: runners.train_algo.TrainAlgoRunner
  script_name: null # if null, no script is run. The user is expected to run the script manually. 

# Prompt configuration
prompt:
  template_name: null
  contents:
    prompt: null

env: "jaxmarl"
algo: "decpomdp_symmetries_op_ippo_ff_hanabi"

extra_workspace_files: []
