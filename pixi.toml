[project]
name = "meta-zsc"
description = "Coding LLMs implementing Zero-Shot Coordination methods"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64"]

[tasks]
postinstall = "pip install --no-build-isolation --no-deps --disable-pip-version-check -e ."
install_jaxmarl = "pip install -e 'JaxMARL[algs]'"

[dependencies]
python = "*"
numpy = "<2"
botocore = "*"
boto3 = "*"
typing-extensions = "4.14.1"
hydra-core = "*"
omegaconf = "*"
pandas = "*"
yaml = "*"
ipykernel = "*"
gymnasium = ">=1.0.0,<2"


[host-dependencies]
pip = "*"
hatchling = "*"
hatch-vcs = "*"

[feature.aider.pypi-dependencies]
aider-chat = "==0.86.1"
hydra-joblib-launcher = "*"


[feature.jax.pypi-dependencies]
jax = "<=0.4.38"


[feature.jax_cuda]
pypi-dependencies = {jax = { version = "<=0.4.38", extras = ["cuda12"]}, flax = {version = "<0.10.4"}, wandb = {version = "==0.21.3"}}
platforms = ["linux-64"]
system-requirements = {cuda = "12"}

[feature.analysis.dependencies]
matplotlib = "*"
seaborn = "*"
tabulate = "*"

[feature.aws.dependencies]
python = "3.12.*"
awscli = ">=2"
aws-session-manager-plugin = "*"

[feature.test.dependencies]
#pytest = ">=6"

[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=meta_zsc --cov-report=xml --cov-report=term-missing"

[environments]
default = ["aider", "test"]
jax = ["jax"]
jax-cuda = ["jax_cuda"]
aws = { features = ["aws"], no-default-feature = true }
analysis = ["analysis"]
